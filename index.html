<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#ffffff">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="단가표">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<title>새한패키지 단가표</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --green:#2EA838;--green-bg:#f0faf0;--green-bdr:#b8e8bb;
  --blue:#1E64B4;--blue-bg:#eef4fd;--blue-bdr:#b3cff2;
  --bg:#f7f8fa;--card:#fff;
  --txt:#111827;--txt2:#6b7280;--txt3:#9ca3af;
  --bdr:#e5e7eb;--bdr2:#d1d5db;
  --red:#dc2626;--red-bg:#fef2f2;
  --amber:#d97706;--amber-bg:#fffbeb;
  --rad:12px;--rad-lg:16px;--rad-xl:22px;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05);
}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:'Noto Sans KR',-apple-system,sans-serif;font-size:14px;overscroll-behavior:none;-webkit-font-smoothing:antialiased}
.app{display:flex;flex-direction:column;height:100dvh;max-width:640px;margin:0 auto;overflow:hidden}

/* 헤더 */
.hdr{flex-shrink:0;background:var(--card);border-bottom:1px solid var(--bdr);padding:max(16px,env(safe-area-inset-top)) 16px 0;box-shadow:var(--shadow)}
.hdr-top{display:flex;align-items:center;justify-content:space-between;gap:10px;padding-bottom:12px}
.brand{display:flex;align-items:center;gap:10px}
.brand-logo{width:38px;height:38px;border-radius:10px;border:1.5px solid var(--bdr);overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:var(--bg)}
.brand-logo img{width:30px;height:30px;object-fit:contain}
.brand-name{font-size:10px;font-weight:600;color:var(--txt3);letter-spacing:.8px;text-transform:uppercase}
.brand-title{font-size:18px;font-weight:800;letter-spacing:-.5px;color:var(--txt)}
.hdr-btns{display:flex;align-items:center;gap:6px;flex-shrink:0}
.ico-btn{display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;background:var(--bg);border:1.5px solid var(--bdr);border-radius:10px;font-size:15px;cursor:pointer;position:relative;transition:background .15s}
.ico-btn:active{background:var(--bdr)}
.red-dot{position:absolute;top:-2px;right:-2px;width:8px;height:8px;background:var(--red);border-radius:50%;border:1.5px solid var(--card);display:none}
.red-dot.on{display:block}
.bh-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 13px;background:linear-gradient(135deg,var(--green),var(--blue));color:#fff;border:none;border-radius:10px;font-size:12px;font-weight:700;text-decoration:none;white-space:nowrap;box-shadow:0 2px 8px rgba(30,100,180,.25);transition:opacity .15s}
.bh-btn:active{opacity:.8}
.bh-dot{width:6px;height:6px;background:#4ade80;border-radius:50%;flex-shrink:0}
.mat-toggle{display:flex;align-items:center;justify-content:center;gap:5px;width:100%;padding:8px;background:none;border:none;border-top:1px solid var(--bdr);color:var(--txt2);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;letter-spacing:.2px;transition:background .15s}
.mat-toggle:active{background:var(--bg)}
.mat-arrow{display:inline-block;transition:transform .25s;font-size:9px;color:var(--txt3)}
.mat-toggle.open .mat-arrow{transform:rotate(180deg)}
.mat-panel{flex-shrink:0;background:#f9fafb;border-bottom:1px solid var(--bdr);overflow:hidden;max-height:0;transition:max-height .3s ease}
.mat-panel.open{max-height:220px}
.mat-inner{padding:12px 16px 14px;display:flex;flex-direction:column;gap:10px}
.mat-row{display:flex;gap:8px;flex-wrap:wrap}
.mat-item{display:flex;align-items:center;gap:7px;flex:1;min-width:110px}
.mat-label{font-size:10px;font-weight:700;color:var(--txt3);white-space:nowrap;min-width:48px;letter-spacing:.3px;text-transform:uppercase}
.mat-input{flex:1;padding:7px 10px;font-size:13px;font-weight:700;background:var(--card);border:1.5px solid var(--bdr2);border-radius:8px;color:var(--txt);text-align:right;outline:none;font-family:inherit;width:70px;min-width:0;transition:border-color .15s}
.mat-input:focus{border-color:var(--blue)}
.mat-unit{font-size:10px;color:var(--txt3);white-space:nowrap}

/* 검색 */
.search-area{flex-shrink:0;padding:10px 14px 8px;background:var(--card);border-bottom:1px solid var(--bdr)}
.search-row{display:flex;gap:8px;margin-bottom:8px}
.search-wrap{flex:1;position:relative;display:flex;align-items:center}
.search-ico{position:absolute;left:11px;font-size:14px;color:var(--txt3);pointer-events:none}
.search-input{width:100%;padding:10px 12px 10px 34px;font-size:14px;border:1.5px solid var(--bdr2);border-radius:var(--rad);background:var(--bg);color:var(--txt);outline:none;font-family:inherit;-webkit-appearance:none;transition:border-color .15s}
.search-input:focus{border-color:var(--blue);background:var(--card)}
.search-input::placeholder{color:var(--txt3)}
.sort-sel{padding:10px 8px;font-size:12px;font-weight:600;border:1.5px solid var(--bdr2);border-radius:var(--rad);background:var(--bg);color:var(--txt2);outline:none;font-family:inherit;-webkit-appearance:none;min-width:76px;cursor:pointer}
.tag-scroll{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none}
.tag-scroll::-webkit-scrollbar{display:none}
.tag{flex-shrink:0;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid var(--bdr2);color:var(--txt2);background:var(--card);user-select:none;white-space:nowrap;transition:all .12s}
.tag.active{background:linear-gradient(135deg,var(--green),var(--blue));color:#fff;border-color:transparent}

/* 통계 */
.stat-bar{flex-shrink:0;display:grid;grid-template-columns:repeat(4,1fr);background:var(--card);border-bottom:1px solid var(--bdr)}
.stat-item{padding:7px 4px;text-align:center;border-right:1px solid var(--bdr)}
.stat-item:last-child{border-right:none}
.stat-lbl{font-size:9px;font-weight:700;color:var(--txt3);letter-spacing:.5px;text-transform:uppercase}
.stat-val{font-size:13px;font-weight:800;margin-top:2px;letter-spacing:-.3px}

/* 목록 */
.list-wrap{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;background:var(--bg)}
.list-inner{padding:10px 12px;display:flex;flex-direction:column;gap:8px}
.item-card{display:flex;align-items:center;padding:13px 14px;background:var(--card);border-radius:var(--rad);box-shadow:var(--shadow);gap:10px;cursor:pointer;border:1.5px solid var(--bdr);transition:transform .1s,box-shadow .1s;position:relative}
.item-card:active{transform:scale(.99);box-shadow:none}
.item-card.modified{border-left:3px solid var(--amber)}
.item-no{font-size:10px;font-weight:700;color:var(--txt3);min-width:22px;text-align:right;flex-shrink:0}
.item-body{flex:1;min-width:0}
.item-name{font-size:14px;font-weight:700;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.2px}
.item-meta{display:flex;align-items:center;gap:5px;margin-top:3px}
.item-cost{font-size:11px;color:var(--txt3);font-weight:500}
.badge{display:inline-flex;align-items:center;padding:1px 7px;border-radius:20px;font-size:10px;font-weight:700;flex-shrink:0}
.b-pet{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-bdr)}
.b-petg{background:var(--amber-bg);color:var(--amber);border:1px solid #fcd34d}
.b-ps{background:var(--bg);color:var(--txt2);border:1px solid var(--bdr2)}
.b-psg{background:var(--amber-bg);color:var(--amber);border:1px solid #fcd34d}
.b-pp{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bdr)}
.b-etc{background:var(--bg);color:var(--txt3);border:1px solid var(--bdr)}
.item-prices{display:flex;flex-direction:column;align-items:flex-end;gap:2px;flex-shrink:0}
.price-gen{font-size:15px;font-weight:800;color:var(--blue);letter-spacing:-.3px}
.price-dis{font-size:11px;font-weight:600;color:var(--green)}
.no-result{text-align:center;padding:80px 24px;color:var(--txt3);font-size:15px;line-height:1.8}

/* FAB */
.fab{position:fixed;bottom:max(24px,env(safe-area-inset-bottom));right:20px;width:54px;height:54px;background:linear-gradient(135deg,var(--green),var(--blue));color:#fff;border:none;border-radius:50%;font-size:26px;cursor:pointer;box-shadow:0 4px 20px rgba(30,100,180,.35);z-index:50;display:flex;align-items:center;justify-content:center;transition:transform .15s}
.fab:active{transform:scale(.91)}

/* 오버레이 */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:flex-end;backdrop-filter:blur(3px)}
.ov.open{display:flex}
.sheet{background:var(--card);border-radius:var(--rad-xl) var(--rad-xl) 0 0;width:100%;max-width:640px;margin:0 auto;padding:0 0 max(24px,env(safe-area-inset-bottom));animation:up .28s cubic-bezier(.32,.72,0,1)}
.sheet.scroll{max-height:88dvh;overflow-y:auto}
@keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
.drag-bar{width:38px;height:4px;background:var(--bdr2);border-radius:2px;margin:12px auto 0}
.sh-head{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 12px;border-bottom:1px solid var(--bdr)}
.sh-title{font-size:16px;font-weight:800;letter-spacing:-.3px}
.sh-btn{padding:8px 18px;background:linear-gradient(135deg,var(--green),var(--blue));color:#fff;border:none;border-radius:20px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity .15s}
.sh-btn:active{opacity:.8}
.sh-btn.ghost{background:var(--bg);color:var(--txt2);border:1.5px solid var(--bdr2)}

/* 상세 */
.d-head{padding:16px 20px 12px;border-bottom:1px solid var(--bdr)}
.d-name{font-size:18px;font-weight:800;letter-spacing:-.4px;line-height:1.2}
.d-meta{display:flex;align-items:center;gap:8px;margin-top:6px}
.d-edit-btn{font-size:11px;font-weight:700;color:var(--blue);background:var(--blue-bg);border:1px solid var(--blue-bdr);padding:3px 11px;border-radius:20px;cursor:pointer;font-family:inherit}
.d-edit-btn:active{opacity:.7}
.d-section{padding:8px 20px 5px;font-size:10px;font-weight:700;color:var(--txt3);background:var(--bg);letter-spacing:.8px;text-transform:uppercase;border-bottom:1px solid var(--bdr)}
.d-row{display:flex;justify-content:space-between;align-items:center;padding:12px 20px;border-bottom:1px solid var(--bdr)}
.d-row:last-child{border-bottom:none}
.d-key{font-size:13px;color:var(--txt2);font-weight:500}
.d-val{font-size:14px;font-weight:700}
.d-val.vb{color:var(--blue);font-size:17px}
.d-val.vg{color:var(--green);font-size:17px}
.d-val.vm{color:var(--txt2);font-weight:600}
.d-val.va{color:var(--amber)}
.d-close{width:calc(100% - 32px);margin:12px 16px 0;padding:14px;background:var(--bg);border:1.5px solid var(--bdr2);border-radius:var(--rad);font-size:15px;font-weight:700;color:var(--txt2);cursor:pointer;font-family:inherit}
.d-close:active{background:var(--bdr)}

/* 수정폼 */
.ef{padding:16px 20px}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:10px;font-weight:700;color:var(--txt3);letter-spacing:.5px;text-transform:uppercase;margin-bottom:5px}
.fi{width:100%;padding:11px 14px;font-size:14px;font-weight:500;border:1.5px solid var(--bdr2);border-radius:var(--rad);background:var(--card);color:var(--txt);outline:none;font-family:inherit;-webkit-appearance:none;transition:border-color .15s}
.fi:focus{border-color:var(--blue)}
.fg-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.del-btn{width:100%;margin-top:4px;padding:13px;background:var(--red-bg);color:var(--red);border:1.5px solid rgba(220,38,38,.2);border-radius:var(--rad);font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.del-btn:active{opacity:.7}

/* 메모 */
.memo-date{padding:8px 20px 2px;font-size:11px;color:var(--txt3);font-weight:500}
.memo-ta{width:100%;min-height:200px;padding:14px 20px;font-size:15px;border:none;outline:none;resize:none;font-family:inherit;color:var(--txt);line-height:1.7}
.memo-ta::placeholder{color:var(--txt3)}
.memo-ok{font-size:12px;font-weight:600;color:var(--green);padding:4px 20px 10px;display:none}

/* 내보내기 */
.export-info{font-size:12px;color:var(--txt2);padding:10px 20px 6px;line-height:1.5}
.export-ta{width:100%;height:200px;padding:13px 20px;font-size:11px;border:none;outline:none;resize:none;font-family:'Courier New',monospace;color:var(--txt);line-height:1.6;background:var(--bg)}
.copy-btn{display:block;width:calc(100% - 32px);margin:0 16px 8px;padding:14px;background:linear-gradient(135deg,var(--green),var(--blue));color:#fff;border:none;border-radius:var(--rad);font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
.copy-btn:active{opacity:.8}

/* 단가조정 */
.adj-desc{font-size:12px;color:var(--txt2);padding:10px 20px 4px;line-height:1.6}
.adj-wrap{padding:8px 16px 16px;display:flex;flex-direction:column;gap:12px}
.adj-box{background:var(--bg);border-radius:var(--rad);padding:14px 16px;border:1.5px solid var(--bdr)}
.adj-box-title{font-size:11px;font-weight:700;color:var(--txt2);margin-bottom:10px;letter-spacing:.2px}
.adj-row{display:flex;align-items:center;gap:10px}
.adj-input{flex:1;padding:11px 14px;font-size:20px;font-weight:800;border:1.5px solid var(--bdr2);border-radius:var(--rad);background:var(--card);color:var(--txt);text-align:center;outline:none;font-family:inherit;transition:border-color .15s}
.adj-input:focus{border-color:var(--blue)}
.adj-unit{font-size:22px;font-weight:800;color:var(--txt3)}
.adj-presets{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}
.adj-pre{padding:5px 11px;font-size:12px;font-weight:600;border:1.5px solid var(--bdr2);border-radius:20px;background:var(--card);color:var(--txt2);cursor:pointer;font-family:inherit;transition:all .12s}
.adj-pre.up{border-color:var(--green-bdr);color:var(--green);background:var(--green-bg)}
.adj-pre.dn{border-color:#fecaca;color:var(--red);background:var(--red-bg)}
.adj-pre:active{opacity:.7}
.adj-preview{font-size:11px;color:var(--txt3);margin-top:6px;min-height:16px;font-weight:500}
.adj-apply{width:100%;padding:15px;background:linear-gradient(135deg,var(--green),var(--blue));color:#fff;border:none;border-radius:var(--rad);font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;box-shadow:0 2px 8px rgba(30,100,180,.2)}
.adj-apply:active{opacity:.8}
.adj-reset{width:100%;padding:12px;background:var(--bg);color:var(--txt2);border:1.5px solid var(--bdr2);border-radius:var(--rad);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.adj-reset:active{background:var(--bdr)}
</style>
</head>
<body>
<div class="app">
  <!-- 헤더 -->
  <div class="hdr">
    <div class="hdr-top">
      <div class="brand">
        <div class="brand-logo"><img src="icon-192.png" alt="새한패키지"></div>
        <div>
          <div class="brand-name">Saehan Package</div>
          <div class="brand-title">단가표</div>
        </div>
      </div>
      <div class="hdr-btns">
        <div style="position:relative;display:inline-flex">
          <button class="ico-btn" onclick="openMemo()">📝</button>
          <span class="red-dot" id="memo-dot"></span>
        </div>
        <button class="ico-btn" onclick="openExport()">📤</button>
        <button class="ico-btn" onclick="openAdj()">📊</button>
        <button class="ico-btn" onclick="downloadExcel()" title="엑셀 다운로드"><svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="1" y="1" width="16" height="16" rx="2.5" fill="#217346"/><text x="9" y="13" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="900" fill="white">XLS</text></svg></button>
        <a class="bh-btn" id="bh-link" href="boxhero://" target="_self">
          <span class="bh-dot"></span>재고확인
        </a>
      </div>
    </div>
    <button class="mat-toggle" id="mat-toggle" onclick="toggleMat()">
      ⚙ 원재료 단가 설정 &nbsp;<span class="mat-arrow">▾</span>
    </button>
  </div>

  <!-- 원재료 단가 패널 -->
  <div class="mat-panel" id="mat-panel">
    <div class="mat-inner">
      <div class="mat-row">
        <div class="mat-item"><span class="mat-label">PET</span><input class="mat-input" id="mp-pet" type="number" value="2100" min="0" step="10" oninput="updateMP()"><span class="mat-unit">원/kg</span></div>
        <div class="mat-item"><span class="mat-label">PET금색</span><input class="mat-input" id="mp-petg" type="number" value="4000" min="0" step="10" oninput="updateMP()"><span class="mat-unit">원/kg</span></div>
      </div>
      <div class="mat-row">
        <div class="mat-item"><span class="mat-label">PS</span><input class="mat-input" id="mp-ps" type="number" value="2500" min="0" step="10" oninput="updateMP()"><span class="mat-unit">원/kg</span></div>
        <div class="mat-item"><span class="mat-label">PS금색</span><input class="mat-input" id="mp-psg" type="number" value="4300" min="0" step="10" oninput="updateMP()"><span class="mat-unit">원/kg</span></div>
        <div class="mat-item"><span class="mat-label">PP</span><input class="mat-input" id="mp-pp" type="number" value="2600" min="0" step="10" oninput="updateMP()"><span class="mat-unit">원/kg</span></div>
      </div>
    </div>
  </div>

  <!-- 검색 -->
  <div class="search-area">
    <div class="search-row">
      <div class="search-wrap">
        <span class="search-ico">🔍</span>
        <input class="search-input" type="search" id="search" placeholder="품명 검색…" autocomplete="off">
      </div>
      <select class="sort-sel" id="sort">
        <option value="">정렬</option>
        <option value="no">번호</option>
        <option value="name">품명</option>
        <option value="gasc">일반가↑</option>
        <option value="gdesc">일반가↓</option>
        <option value="dasc">유통가↑</option>
        <option value="ddesc">유통가↓</option>
        <option value="pasc">가공비↑</option>
        <option value="pdesc">가공비↓</option>
      </select>
    </div>
    <div class="tag-scroll" id="tags"></div>
  </div>

  <!-- 통계 -->
  <div class="stat-bar">
    <div class="stat-item"><div class="stat-lbl">전체</div><div class="stat-val" id="s-tot">0</div></div>
    <div class="stat-item"><div class="stat-lbl">결과</div><div class="stat-val" id="s-fil">0</div></div>
    <div class="stat-item"><div class="stat-lbl">최저가</div><div class="stat-val" id="s-min">—</div></div>
    <div class="stat-item"><div class="stat-lbl">최고가</div><div class="stat-val" id="s-max">—</div></div>
  </div>

  <!-- 목록 -->
  <div class="list-wrap">
    <div class="list-inner" id="list"></div>
    <div id="no-res" class="no-result" style="display:none">검색 결과가 없어요 😶</div>
  </div>
</div>

<!-- FAB -->
<button class="fab" onclick="openEdit(null)">+</button>

<!-- 상세 -->
<div class="ov" id="ov-detail" onclick="if(event.target===this)closeOv('ov-detail')">
  <div class="sheet scroll">
    <div class="drag-bar"></div>
    <div class="d-head"><div class="d-name" id="d-nm"></div><div class="d-meta" id="d-bd"></div></div>
    <div id="d-rows"></div>
    <button class="d-close" onclick="closeOv('ov-detail')">닫기</button>
  </div>
</div>

<!-- 수정/추가 -->
<div class="ov" id="ov-edit" onclick="if(event.target===this)closeOv('ov-edit')">
  <div class="sheet scroll">
    <div class="drag-bar"></div>
    <div class="sh-head"><span class="sh-title" id="edit-title">품목 추가</span><button class="sh-btn" onclick="saveEdit()">저장</button></div>
    <div class="ef">
      <div class="fg"><label>품명 *</label><input class="fi" id="ef-name" placeholder="예) 화과자4구 상"></div>
      <div class="fg-row">

// ── 상수 ──
const DENSITY = {'PET':1.34,'PET금색':1.34,'PS':1.05,'PS금색':1.05,'PP':0.93};
const CATS = [{l:'전체',k:'all'},{l:'화과자',k:'화과자'},{l:'SH-18x',k:'SH-1'},{l:'SH-B',k:'SH-B'},{l:'SH-C',k:'SH-C'},{l:'SH-R',k:'SH-R'},{l:'SH-S/T',k:'SH-S|SH-T'},{l:'마카롱',k:'마카롱'},{l:'뚱카롱',k:'뚱카롱'},{l:'떡케익',k:'떡케익'},{l:'기타',k:'기타'}];

// ── 상태 ──
let MP = {PET:2100,'PET금색':4000,PS:2500,'PS금색':4300,PP:2600};
let OV = JSON.parse(localStorage.getItem('shp_overrides')||'{}');
let AD = JSON.parse(localStorage.getItem('shp_added')||'[]');
let DL = JSON.parse(localStorage.getItem('shp_deleted')||'[]');

// 단가 조정 배율 (1.0 = 원본, 1.1 = +10%)
let GEN_MULT = parseFloat(localStorage.getItem('shp_gen_mult')||'1');
let DIS_MULT = parseFloat(localStorage.getItem('shp_dis_mult')||'1');

let aTag='all', sKey='', sQ='', editId=null;

// ── 데이터 조회 ──
function getD(){
  return [
    ...BASE_D.filter(r => !DL.includes(r[0])).map(r => {
      const ov = OV[r[0]];
      return [
        r[0],
        ov&&ov[1]!=null ? ov[1] : r[1],
        ov&&ov[2]!=null ? ov[2] : r[2],
        ov&&ov[3]!=null ? ov[3] : r[3],
        ov&&ov[4]!=null ? ov[4] : r[4],
        ov&&ov[5]!=null ? ov[5] : r[5],
        ov&&ov[6]!=null ? ov[6] : r[6],
        Math.round((ov&&ov[7]!=null ? ov[7] : r[7]) * GEN_MULT),
        Math.round((ov&&ov[8]!=null ? ov[8] : r[8]) * DIS_MULT),
      ];
    }),
    ...AD
  ];
}

function saveL(){
  localStorage.setItem('shp_overrides', JSON.stringify(OV));
  localStorage.setItem('shp_added', JSON.stringify(AD));
  localStorage.setItem('shp_deleted', JSON.stringify(DL));
}

// ── 계산 ──
function calcCost(r){
  if(!r[3]||!r[4]||!r[5]||!r[6]) return null;
  return Math.round(r[3]*r[4]*r[5]*(DENSITY[r[2]]||1.34)/1000000*(MP[r[2]]||MP.PET)/r[6]);
}
function calcProc(r){
  const c = calcCost(r);
  return (c!==null&&r[7]&&r[6]) ? Math.round((r[7]-c)*r[6]) : null;
}
function calcWeight(r){
  // 개당 중량(g) = 두께(mm) × 원단폭(mm) × 이송(mm) × 밀도(g/cm³) / 1000 / 몰드수
  if(!r[3]||!r[4]||!r[5]||!r[6]) return null;
  const w = r[3]*r[4]*r[5]*(DENSITY[r[2]]||1.34)/1000/r[6];
  return Math.round(w*10)/10; // 소수점 1자리
}
function fp(v){ return v ? Math.round(Number(v)).toLocaleString()+'원' : '—'; }

// ── 원재료 ──
function toggleMat(){
  const p=document.getElementById('mat-panel'), b=document.getElementById('mat-toggle');
  const o=p.classList.toggle('open'); b.classList.toggle('open',o);
}
function updateMP(){
  MP = {
    PET: +document.getElementById('mp-pet').value||2100,
    'PET금색': +document.getElementById('mp-petg').value||4000,
    PS: +document.getElementById('mp-ps').value||2500,
    'PS금색': +document.getElementById('mp-psg').value||4300,
    PP: +document.getElementById('mp-pp').value||2600,
  };
  render();
}

// ── 렌더 ──
function bdg(m){
  const map={'PET':'<span class="badge b-pet">PET</span>','PET금색':'<span class="badge b-petg">PET금</span>','PS':'<span class="badge b-ps">PS</span>','PS금색':'<span class="badge b-psg">PS금</span>','PP':'<span class="badge b-pp">PP</span>','사출':'<span class="badge b-etc">사출</span>'};
  return map[m]||map['PET'];
}
function mc(n,k){
  if(k==='all') return true;
  if(k==='기타') return !['화과자','SH-1','SH-B','SH-C','SH-R','SH-S','SH-T','마카롱','뚱카롱','떡케익'].some(p=>n.includes(p));
  return k.split('|').some(p=>n.includes(p));
}
function gf(){
  let d = getD().filter(r=>(!sQ||r[1].toLowerCase().includes(sQ))&&mc(r[1],aTag));
  const sorts = {
    'no':(a,b)=>a[0]-b[0], 'name':(a,b)=>a[1].localeCompare(b[1]),
    'gasc':(a,b)=>a[7]-b[7], 'gdesc':(a,b)=>b[7]-a[7],
    'dasc':(a,b)=>a[8]-b[8], 'ddesc':(a,b)=>b[8]-a[8],
    'pasc':(a,b)=>(calcProc(a)||0)-(calcProc(b)||0),
    'pdesc':(a,b)=>(calcProc(b)||0)-(calcProc(a)||0),
  };
  if(sorts[sKey]) d.sort(sorts[sKey]);
  return d;
}
function rTags(){
  document.getElementById('tags').innerHTML = CATS.map(c=>
    `<span class="tag ${aTag===c.k?'active':''}" onclick="setT('${c.k}')">${c.l}</span>`
  ).join('');
}
function setT(k){ aTag=k; rTags(); render(); }

function render(){
  const d=gf(), total=getD().length;
  const prices=d.map(r=>r[7]).filter(v=>v>0);
  document.getElementById('s-tot').textContent=total;
  document.getElementById('s-fil').textContent=d.length;
  document.getElementById('s-min').textContent=prices.length?Math.min(...prices).toLocaleString()+'원':'—';
  document.getElementById('s-max').textContent=prices.length?Math.max(...prices).toLocaleString()+'원':'—';
  if(!d.length){
    document.getElementById('list').innerHTML='';
    document.getElementById('no-res').style.display='block';
    return;
  }
  document.getElementById('no-res').style.display='none';
  document.getElementById('list').innerHTML=d.map(r=>{
    const c=calcCost(r);
    const mod=OV[r[0]]||AD.find(x=>x[0]===r[0]);
    return `<div class="item-card${mod?' modified':''}" onclick="showD(${r[0]})">
      <div class="item-no">${r[0]}</div>
      <div class="item-body">
        <div class="item-name">${r[1]}</div>
        <div class="item-meta">${bdg(r[2])}${c!==null?`<span class="item-cost">원단가 ${c.toLocaleString()}원</span>`:''}</div>
      </div>
      <div class="item-prices">
        <div class="price-gen">${fp(r[7])}</div>
        <div class="price-dis">${fp(r[8])}</div>
      </div>
    </div>`;
  }).join('');
}

// ── 상세 ──
function showD(id){
  const r=getD().find(x=>x[0]===id); if(!r) return;
  document.getElementById('d-nm').textContent=r[1];
  document.getElementById('d-bd').innerHTML=bdg(r[2])+`<button class="d-edit-btn" onclick="openEdit(${id})">수정</button>`;
  const c=calcCost(r), p=calcProc(r), dc=r[7]>0&&r[8]>0?Math.round((1-r[8]/r[7])*100):0;
  let h='';
  h+=`<div class="d-section">규격</div>`;
  h+=`<div class="d-row"><span class="d-key">소재</span><span class="d-val">${r[2]}</span></div>`;
  if(r[3]) h+=`<div class="d-row"><span class="d-key">원단 두께</span><span class="d-val">${r[3]}mm</span></div>`;
  if(r[4]&&r[5]) h+=`<div class="d-row"><span class="d-key">원단폭 × 이송</span><span class="d-val">${r[4]} × ${r[5]}mm</span></div>`;
  if(r[6]) h+=`<div class="d-row"><span class="d-key">몰드홈 수량</span><span class="d-val">${r[6]}개/판</span></div>`;
  h+=`<div class="d-section">원가 분석</div>`;
  const w=calcWeight(r);
  if(w!==null) h+=`<div class="d-row"><span class="d-key">개당 중량</span><span class="d-val vm">${w}g</span></div>`;
  if(c!==null) h+=`<div class="d-row"><span class="d-key">1개당 원단가</span><span class="d-val vm">${c.toLocaleString()}원</span></div>`;
  if(p!==null) h+=`<div class="d-row"><span class="d-key">1판당 가공비</span><span class="d-val va">${p.toLocaleString()}원</span></div>`;
  h+=`<div class="d-section">판매 단가</div>`;
  h+=`<div class="d-row"><span class="d-key">일반단가</span><span class="d-val vb">${fp(r[7])}</span></div>`;
  h+=`<div class="d-row"><span class="d-key">유통단가</span><span class="d-val vg">${fp(r[8])}</span></div>`;
  if(dc>0) h+=`<div class="d-row"><span class="d-key">유통 할인율</span><span class="d-val">${dc}%</span></div>`;
  document.getElementById('d-rows').innerHTML=h;
  openOv('ov-detail');
}

// ── 수정/추가 ──
function openEdit(id){
  editId=id; const isNew=id===null;
  document.getElementById('edit-title').textContent=isNew?'품목 추가':'품목 수정';
  document.getElementById('ef-del').style.display=isNew?'none':'block';
  if(isNew){
    ['ef-name','ef-feed','ef-width','ef-thick','ef-mold','ef-gen','ef-dist'].forEach(i=>document.getElementById(i).value='');
    document.getElementById('ef-mat').value='PET';
  } else {
    const r=getD().find(x=>x[0]===id); if(!r) return;
    document.getElementById('ef-name').value=r[1];
    document.getElementById('ef-mat').value=r[2];
    document.getElementById('ef-thick').value=r[3]||'';
    document.getElementById('ef-feed').value=r[4]||'';
    document.getElementById('ef-width').value=r[5]||'';
    document.getElementById('ef-mold').value=r[6]||'';
    document.getElementById('ef-gen').value=r[7]||'';
    document.getElementById('ef-dist').value=r[8]||'';
  }
  closeOv('ov-detail');
  openOv('ov-edit');
}
function saveEdit(){
  const name=document.getElementById('ef-name').value.trim();
  if(!name){ alert('품명을 입력하세요'); return; }
  const vals=[
    null,name,
    document.getElementById('ef-mat').value,
    parseFloat(document.getElementById('ef-thick').value)||0,
    parseInt(document.getElementById('ef-feed').value)||0,
    parseInt(document.getElementById('ef-width').value)||0,
    parseInt(document.getElementById('ef-mold').value)||0,
    parseFloat(document.getElementById('ef-gen').value)||0,
    parseFloat(document.getElementById('ef-dist').value)||0,
  ];
  if(editId===null){
    vals[0]=Math.max(...BASE_D.map(r=>r[0]),...AD.map(r=>r[0]),0)+1;
    AD.push(vals);
  } else {
    vals[0]=editId;
    const ai=AD.findIndex(r=>r[0]===editId);
    if(ai>=0) AD[ai]=vals;
    else OV[editId]={1:name,2:vals[2],3:vals[3],4:vals[4],5:vals[5],6:vals[6],7:vals[7],8:vals[8]};
  }
  saveL(); closeOv('ov-edit'); render();
}
function deleteItem(){
  if(!confirm('이 품목을 삭제하시겠습니까?')) return;
  const ai=AD.findIndex(r=>r[0]===editId);
  if(ai>=0) AD.splice(ai,1);
  else { DL.push(editId); delete OV[editId]; }
  saveL(); closeOv('ov-edit'); closeOv('ov-detail'); render();
}

// ── 단가 일괄조정 ──
function openAdj(){
  // 현재 배율을 퍼센트로 역산해서 표시
  document.getElementById('adj-gen').value = GEN_MULT!==1 ? Math.round((GEN_MULT-1)*100) : '';
  document.getElementById('adj-dis').value = DIS_MULT!==1 ? Math.round((DIS_MULT-1)*100) : '';
  adjPreview();
  openOv('ov-adj');
}
function setAdjVal(id, val){
  document.getElementById(id).value=val;
  adjPreview();
}
function adjPreview(){
  const gp=parseFloat(document.getElementById('adj-gen').value)||0;
  const dp=parseFloat(document.getElementById('adj-dis').value)||0;
  const s=BASE_D.find(r=>r[0]===5); // 화과자2구 상 샘플
  if(s){
    const cg=Math.round(s[7]*GEN_MULT), ng=Math.round(s[7]*(1+gp/100));
    const cd=Math.round(s[8]*DIS_MULT), nd=Math.round(s[8]*(1+dp/100));
    document.getElementById('adj-gen-prev').textContent=
      gp!==0 ? `예시) 화과자2구 상: ${cg.toLocaleString()}원 → ${ng.toLocaleString()}원` : '';
    document.getElementById('adj-dis-prev').textContent=
      dp!==0 ? `예시) 화과자2구 상: ${cd.toLocaleString()}원 → ${nd.toLocaleString()}원` : '';
  }
}
function applyAdj(){
  const gp=parseFloat(document.getElementById('adj-gen').value)||0;
  const dp=parseFloat(document.getElementById('adj-dis').value)||0;
  if(gp===0&&dp===0){ alert('퍼센트를 입력하세요.'); return; }
  if(!confirm(`전체 ${BASE_D.length}개 품목에 적용합니다.\n일반단가: ${gp>0?'+':''}${gp}%\n유통단가: ${dp>0?'+':''}${dp}%\n\n계속하시겠습니까?`)) return;

  GEN_MULT = 1+gp/100;
  DIS_MULT = 1+dp/100;
  localStorage.setItem('shp_gen_mult', GEN_MULT.toString());
  localStorage.setItem('shp_dis_mult', DIS_MULT.toString());

  closeOv('ov-adj');
  render();
  alert(`✓ 적용 완료!\n일반단가 ${gp>0?'+':''}${gp}% / 유통단가 ${dp>0?'+':''}${dp}%`);
}
function resetAdj(){
  if(!confirm('단가를 원래 값으로 되돌리시겠습니까?')) return;
  GEN_MULT=1; DIS_MULT=1;
  localStorage.removeItem('shp_gen_mult');
  localStorage.removeItem('shp_dis_mult');
  document.getElementById('adj-gen').value='';
  document.getElementById('adj-dis').value='';
  adjPreview();
  render();
  alert('✓ 원래 단가로 복원됐습니다.');
}

// ── 내보내기 ──
function openExport(){
  const ok=Object.keys(OV), total=ok.length+AD.length+DL.length;
  if(!total){ alert('수정한 내용이 없습니다.'); return; }
  let lines=[`=== 새한패키지 단가표 수정사항 ===`,`날짜: ${new Date().toLocaleString('ko-KR')}`,`총 ${total}건 (수정 ${ok.length}·추가 ${AD.length}·삭제 ${DL.length})`,``];
  if(ok.length){
    lines.push('[ 수정 ]');
    ok.forEach(id=>{
      const orig=BASE_D.find(r=>r[0]==id), ov=OV[id];
      lines.push(`NO.${id} ${orig?orig[1]:'?'}`);
      const f={1:'품명',2:'소재',3:'두께',4:'원단폭',5:'이송',6:'몰드수',7:'일반단가',8:'유통단가'};
      Object.keys(ov).forEach(k=>{if(orig&&orig[k]!=ov[k])lines.push(`  ${f[k]}: ${orig[k]} → ${ov[k]}`);});
    });
    lines.push('');
  }
  if(AD.length){ lines.push('[ 추가 ]'); AD.forEach(r=>lines.push(`NO.${r[0]} ${r[1]} / 소재:${r[2]} / 두께:${r[3]} / 원단폭:${r[4]} / 이송:${r[5]} / 몰드수:${r[6]} / 일반단가:${r[7]}원 / 유통단가:${r[8]}원`)); lines.push(''); }
  if(DL.length){ lines.push('[ 삭제 ]'); DL.forEach(id=>{const o=BASE_D.find(r=>r[0]==id);lines.push(`NO.${id} ${o?o[1]:'?'}`);});lines.push(''); }
  lines.push('=== Claude에게 이 내용을 붙여넣기 하세요 ===');
  document.getElementById('export-ta').value=lines.join('\n');
  document.getElementById('export-info').textContent=`수정 ${ok.length}건·추가 ${AD.length}건·삭제 ${DL.length}건 — 복사 후 Claude에게 붙여넣으면 GitHub에 영구 반영됩니다`;
  openOv('ov-export');
}
function copyExport(){
  navigator.clipboard.writeText(document.getElementById('export-ta').value).then(()=>{
    const b=document.querySelector('.copy-btn'); b.textContent='✓ 복사 완료!';
    setTimeout(()=>{b.textContent='📋 클립보드에 복사';},2200);
  }).catch(()=>{document.getElementById('export-ta').select();document.execCommand('copy');});
}

// ── 오버레이 ──
function openOv(id){ document.getElementById(id).classList.add('open'); document.body.style.overflow='hidden'; }
function closeOv(id){ document.getElementById(id).classList.remove('open'); document.body.style.overflow=''; }

// ── 박스히어로 ──
(function(){
  const btn=document.getElementById('bh-link'); if(!btn) return;
  btn.addEventListener('click',function(e){
    e.preventDefault();
    const isAndroid=/Android/i.test(navigator.userAgent);
    const isPWA=window.matchMedia('(display-mode: standalone)').matches||window.navigator.standalone;
    if(isAndroid&&isPWA){
      window.location.href='intent://open#Intent;scheme=boxhero;package=com.bgpworks.boxhero;end';
    } else {
      window.location.href='boxhero://';
      const fb=setTimeout(()=>{window.open('https://web.boxhero-app.com','_blank');},1500);
      window.addEventListener('blur',()=>clearTimeout(fb),{once:true});
      document.addEventListener('visibilitychange',()=>{if(document.hidden)clearTimeout(fb);},{once:true});
    }
  });
})();


// ── 엑셀 다운로드 ──
function downloadExcel(){
  const d = getD();
  const headers = ['NO','품명','소재','두께(mm)','원단폭(mm)','이송(mm)','몰드수(개/판)','일반단가(원)','유통단가(원)','개당중량(g)','원단가(원)'];
  const rows = d.map(r => {
    const w = calcWeight(r);
    const c = calcCost(r);
    return [
      r[0], r[1], r[2],
      r[3]||'', r[4]||'', r[5]||'', r[6]||'',
      r[7]||'', r[8]||'',
      w!==null ? w : '',
      c!==null ? c : ''
    ];
  });
  // CSV (BOM 포함 → 엑셀에서 한글 깨짐 방지)
  const BOM = '\uFEFF';
  const csvContent = BOM + [headers, ...rows].map(row =>
    row.map(v => (typeof v === 'string' && v.includes(',')) ? `"${v}"` : v).join(',')
  ).join('\n');
  const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const now = new Date();
  const dateStr = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}`;
  a.href = url;
  a.download = `새한패키지_단가표_${dateStr}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}
